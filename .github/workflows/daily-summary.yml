 name: Daily AI News - Telegram

  on:
    schedule:
      - cron: '0 0 * * *'         # UTC 0:00 = 北京时间 8:00
    workflow_dispatch:             # Allow manual trigger

  jobs:
    daily-summary:
      runs-on: ubuntu-latest
      permissions:
        contents: write

      steps:
        - name: Checkout code
          uses: actions/checkout@v6

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.12"

        - name: Install uv
          uses: astral-sh/setup-uv@v3

        - name: Install dependencies
          run: uv sync

        - name: Prepare GitHub Actions config
          run: cp data/config.github.json data/config.json

        - name: Set current date
          run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

        - name: Run Horizon
          env:
            DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
            TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          run: uv run horizon --hours 24

        - name: Send daily summaries to Telegram
          env:
            TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          run: |
            python -c "
            import os, requests

            bot_token = os.environ['TELEGRAM_BOT_TOKEN']
            chat_id = os.environ['TELEGRAM_CHAT_ID']
            date = os.environ['DATE']
            base_url = f'https://api.telegram.org/bot{bot_token}'

            import glob
            files = sorted(glob.glob('data/summaries/horizon-*.md'))
            if not files:
                print('No summary files found!')
                exit(1)

            for filepath in files:
                with open(filepath, 'r', encoding='utf-8') as f:
                    content = f.read()

                max_len = 4000
                chunks = []
                remaining = content

                while len(remaining) > max_len:
                    split_at = remaining.rfind('\n\n', 0, max_len)
                    if split_at == -1 or split_at < max_len // 2:
                        split_at = remaining.rfind('\n', 0, max_len)
                    if split_at == -1 or split_at < max_len // 2:
                        split_at = max_len
                    chunks.append(remaining[:split_at].strip())
                    remaining = remaining[split_at:].strip()

                chunks.append(remaining)

                for i, chunk in enumerate(chunks):
                    prefix = f'({i+1}/{len(chunks)}) ' if len(chunks) > 1 else ''
                    payload = {
                        'chat_id': chat_id,
                        'text': prefix + chunk,
                        'parse_mode': 'Markdown',
                        'disable_web_page_preview': True
                    }
                    resp = requests.post(f'{base_url}/sendMessage', data=payload, timeout=30)
                    print(f'Sent {filepath} chunk {i+1}/{len(chunks)}: {resp.status_code} {resp.json().get(\"description\",
  \"\")}')
            "

        - name: Notify failure to Telegram
          if: failure()
          env:
            TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          run: |
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              -d "text=❌ AI 新闻日报生成失败%0A%0A请检查日志: ${{ github.server_url }}/${{ github.repository
  }}/actions/runs/${{ github.run_id }}"

        - name: Deploy to GitHub Pages
          uses: peaceiris/actions-gh-pages@v4
          with:
            github_token: ${{ secrets.GITHUB_TOKEN }}
            publish_dir: ./docs
            keep_files: true
            commit_message: "📝 Daily Summary: ${{ env.DATE }}"
            publish_branch: gh-pages
            enable_jekyll: true
